runtime:
  seed: 271828
  neuron_version: 8.2.7
  boundary_interval_ms: 1.0
  microtrace_interval_ms: 0.025
  cvode_reinit_at_boundary: true

burnin:
  voltage_delta_mv: 0.001
  calcium_relative_delta: 0.0001
  slow_state_delta: 0.00001
  consecutive_ms: 20
  maximum_duration_ms: 5000
  calcium_floor: 1.0e-12
  slow_mechanisms:
    - CaDynamics_E2
    - Ih
    - Im

somatic_current:
  driver: native_iclamp_timing_before_cvode_reinit
  smoke_test:
    amplitude_na: 0.1
    offset_ms: 0.1
    duration_ms: 0.8
    minimum_voltage_response_mv: 0.001
  calibration:
    candidate_amplitudes_na: [0.5, 0.75, 1.0, 1.5, 2.0, 3.0, 4.0, 6.0]
    selection_rule: smallest_tested_with_both_soma_and_ais_spike

dataset:
  default_trajectory_count: 36
  duration_ms_per_trajectory: 12
  categories:
    - rest_subthreshold
    - local_synaptic
    - somatic_events
    - dendritic_events
  splits:
    - train
    - validation
    - test
  state_dtype: float64
  microtrace_dtype: float32
  save_native_snapshot_per_transition: true
  save_all_segment_voltage_microtraces: true
  compression: gzip

events:
  detector_version: diagnostic-v0.1.0
  status: provisional_visual_review_required

completion:
  replay_tolerance: 1.0e-5
  require_same_input_identity: true
  require_different_input_divergence: true
  require_teacher_hash_match: true
  require_observed_somatic_current: true
  require_somatic_event_coverage: true
