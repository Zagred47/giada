schema_version: 1.1.0

teacher:
  repository: https://github.com/SelfishGene/neuron_as_deep_net.git
  commit: 074c4666300a8ad246601dab179a97a6942f0f29
  segment_count: 642
  preserve_morphology: true
  preserve_mod_mechanisms: true
  preserve_canonical_weights: true
  boundary_interval_ms: 1.0
  microtrace_interval_ms: 0.025

release_contract:
  observation: same_timestamp_pre_and_post_original_NET_RECEIVE
  infer_from_t_plus_1: false
  rng: Random123
  rng_distribution: negexp(1)
  views: [U_scheduled, U_rng, U_realized]
  deployment_boundary: authentic_synaptic_frontend_before_learned_membrane_core
  pilot_transition_count: 8

biological_pilot:
  seeds: [510001, 510002, 510003]
  dendritic_duration_ms: 80
  somatic_duration_ms: 20
  somatic_current_factors: [0.60, 0.75, 0.90, 1.00, 1.10, 1.25]
  nmda_sweep:
    synapse_counts: [4, 6, 8, 10, 12]
    burst_counts: [1, 2]
    event_windows_ms: [0.20, 0.40, 0.80]
    burst_start_ms: 3
    burst_interval_ms: 1
  calcium_sweep:
    synapse_counts: [6, 8, 10, 12]
    paired: [false, true]
    event_windows_ms: [0.40, 0.80]
    burst_count: 3
    burst_start_ms: 3
    burst_interval_ms: 1
  recovery_probe_delays_ms: [20, 50, 80]
  recovery_duration_ms: 200
  recovery_voltage_tolerance_mv: 5.0
  recovery_calcium_fraction: 0.10
  recovery_min_pv: 0.75

support_targets:
  train: {positive_per_class: 64, hard_negative_per_class: 128}
  validation: {positive_per_class: 16, hard_negative_per_class: 32}
  deterministic_test: {positive_per_class: 16, hard_negative_per_class: 32}
  count_unit: independent_episode

splits:
  required:
    - train
    - validation
    - deterministic_test
    - event_boundary_test
    - held_out_branch_test
    - held_out_seed_test
    - branching_near_test
    - branching_far_test
    - release_identifiability_test
    - recovery_test
  isolate_by: [trajectory, snapshot, seed, branch, protocol_family]

storage:
  format: hdf5
  compression: gzip
  target_transitions: [10000, 30000]
  expected_size_gib: [2.5, 7.5]
  native_snapshot_stride_ms: 10
  boundary_dtype: float64
  microtrace_dtype: float32_after_finite_validation

validation:
  exhaustive_replay: true
  replay_tolerance: 1.0e-5
  require_causal_release_replay: true
  require_same_state_layout_as_1_0_1: true
  require_all_targeted_splits: true
  require_uncensored_calcium_and_plateau: true
  require_minimum_independent_support: true
  require_held_out_branch_and_seed: true
  require_near_and_far_branching: true
  require_recovery_probe: true
  require_no_nan_or_inf: true
