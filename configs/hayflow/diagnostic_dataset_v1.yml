schema_version: 1.0.1

teacher:
  repository: https://github.com/SelfishGene/neuron_as_deep_net.git
  commit: 074c4666300a8ad246601dab179a97a6942f0f29
  segment_count: 642
  core_state_width: 17220
  privileged_state_width: 9182

provenance:
  calibration_notebook: notebooks/01b_dendritic_protocol_calibration.ipynb
  required_calibration_artifact_count: 88
  require_artifact_sha256_validation: true
  require_exact_corrected_runtime_prefix_overlap_ms: 6
  historical_01b_traces_are_hash_verified_provenance_only: true

confirmed_protocols:
  nmda_plateau:
    protocol_id: tuft_nmda_plateau-tuft-n12-b2-r1-unpaired-branch-w400
    seeds: [310001, 310002, 310003]
    required_event_kinds: [nmda_plateau]
    duration_ms: 80
  paired_calcium_spike:
    protocol_id: paired_bap_calcium_spike-hot_zone-n12-b3-r1-paired-nearest-w800
    seeds: [310001, 310002, 310003]
    required_event_kinds: [calcium_spike]
    duration_ms: 80

negative_controls:
  nmda_plateau:
    - fewer_synapses_n8
    - alternate_tuft_branch_n8
  paired_calcium_spike:
    - unpaired
    - fewer_synapses_n8
  preserve_confirmed_positive_schedule: true
  change_canonical_netcon_weights: false
  require_every_declared_negative_to_suppress_target_event: true

boundary_positive_variants:
  nmda_plateau:
    - wider_event_window_w800

storage:
  format: hdf5
  compression: gzip
  boundary_interval_ms: 1.0
  microtrace_interval_ms: 0.025
  boundary_dtype: float64
  microtrace_dtype: float32_after_finite_validation
  save_all_segment_voltage_microtraces: true
  native_snapshot_stride_ms: 10
  replay_from_nearest_checkpoint: true

splits:
  required:
    - train
    - validation
    - deterministic_test
    - event_boundary_test
    - branching_test
  split_whole_trajectories_only: true

validation:
  exhaustive_transition_replay: true
  replay_tolerance: 1.0e-5
  require_non_censored_positive_events: true
  require_near_threshold_negative_per_family: true
  require_branching_same_initial_state: true
  require_branching_future_divergence: true
  require_no_nan_or_inf: true

preflight:
  confirmed_prefix_duration_ms: 6
  require_exact_corrected_runtime_overlap: true
  historical_01b_traces_are_hash_verified_provenance_only: true
  require_single_pulse_soma_and_ais_spike: true
  require_identical_branching_initial_state: true

figures:
  use_stimulus_relative_time: true
  separate_incompatible_units: true
  calcium_unit: uM
  nmda_conductance_unit: nS
  show_onset_peak_offset: true
  consistent_axes_across_seeds: true
