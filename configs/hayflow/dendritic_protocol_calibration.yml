schema_version: 0.3.0

experiment:
  name: dendritic_protocol_calibration
  duration_ms: 35
  sample_interval_ms: 0.025
  seeds: [310001, 310002, 310003]
  required_success_fraction: 0.6666666666666666
  required_event_kinds_for_completion: [nmda_spike, nmda_plateau, calcium_spike]
  confirmation_duration_ms: 160
  confirmation_overlap_tolerance: 1.0e-9
  preserve_canonical_synaptic_weights: true
  stop_at_first_robust_level: true

families:
  # Optional strict protocol: useful if a local NMDA event can be isolated from
  # soma/AIS firing. The probe follows the center of the selected tree cluster.
  local_nmda_spike_isolated:
    target: tuft
    selection_mode: branch_cluster
    event_probe_mode: cluster_center
    event_probe_kinds: [nmda_spike, nmda_plateau]
    event_window_ms: 0.2
    maximum_tree_distance_um: 180.0
    required_event_kinds: [nmda_spike]
    forbidden_event_kinds: [axonal_spike, somatic_spike]
    required_for_completion: false
    burst_start_ms: 3
    burst_interval_ms: 1
    pair_with_somatic_spike: false
    levels:
      - {synapse_count: 4, burst_count: 1, events_per_synapse_per_burst: 1, event_window_ms: 0.15}
      - {synapse_count: 8, burst_count: 1, events_per_synapse_per_burst: 1, event_window_ms: 0.15}
      - {synapse_count: 8, burst_count: 2, events_per_synapse_per_burst: 1, event_window_ms: 0.20}
      - {synapse_count: 12, burst_count: 2, events_per_synapse_per_burst: 1, event_window_ms: 0.20}
      - {synapse_count: 16, burst_count: 2, events_per_synapse_per_burst: 1, event_window_ms: 0.30}
      - {synapse_count: 16, burst_count: 3, events_per_synapse_per_burst: 1, event_window_ms: 0.40}

  # Required event-rich protocol. Soma/AIS spikes are recorded but do not
  # invalidate a genuine plateau; isolation is evaluated by the family above.
  tuft_nmda_plateau:
    target: tuft
    selection_mode: branch_cluster
    event_probe_mode: cluster_center
    event_probe_kinds: [nmda_spike, nmda_plateau]
    maximum_tree_distance_um: 220.0
    required_event_kinds: [nmda_plateau]
    required_for_completion: true
    burst_start_ms: 3
    burst_interval_ms: 1
    pair_with_somatic_spike: false
    levels:
      - {synapse_count: 8, burst_count: 1, events_per_synapse_per_burst: 1, event_window_ms: 0.80}
      - {synapse_count: 8, burst_count: 2, events_per_synapse_per_burst: 1, event_window_ms: 0.40}
      - {synapse_count: 12, burst_count: 2, events_per_synapse_per_burst: 1, event_window_ms: 0.40}
      - {synapse_count: 16, burst_count: 2, events_per_synapse_per_burst: 1, event_window_ms: 0.40}
      - {synapse_count: 16, burst_count: 3, events_per_synapse_per_burst: 1, event_window_ms: 0.80}
      - {synapse_count: 16, burst_count: 3, events_per_synapse_per_burst: 1, event_window_ms: 0.30}

  # Optional search for a calcium spike driven without explicit somatic pairing.
  hot_zone_calcium_spike_unpaired:
    target: hot_zone
    selection_mode: target_nearest
    event_probe_mode: target_representative
    event_probe_kinds: [calcium_spike]
    maximum_tree_distance_um: 300.0
    required_event_kinds: [calcium_spike]
    required_for_completion: false
    burst_start_ms: 3
    burst_interval_ms: 1
    pair_with_somatic_spike: false
    levels:
      - {synapse_count: 8, burst_count: 2, events_per_synapse_per_burst: 1, event_window_ms: 0.80}
      - {synapse_count: 12, burst_count: 3, events_per_synapse_per_burst: 1, event_window_ms: 0.50}
      - {synapse_count: 16, burst_count: 3, events_per_synapse_per_burst: 1, event_window_ms: 0.80}
      - {synapse_count: 16, burst_count: 4, events_per_synapse_per_burst: 1, event_window_ms: 0.40}
      - {synapse_count: 16, burst_count: 5, events_per_synapse_per_burst: 1, event_window_ms: 0.25}

  # Canonical BAC-like calcium protocol established by the first calibration.
  paired_bap_calcium_spike:
    target: hot_zone
    selection_mode: target_nearest
    event_probe_mode: target_representative
    event_probe_kinds: [calcium_spike]
    maximum_tree_distance_um: 300.0
    required_event_kinds: [calcium_spike]
    required_for_completion: true
    burst_start_ms: 3
    burst_interval_ms: 1
    pair_with_somatic_spike: true
    levels:
      - {synapse_count: 8, burst_count: 2, events_per_synapse_per_burst: 1, event_window_ms: 0.80}
      - {synapse_count: 12, burst_count: 2, events_per_synapse_per_burst: 1, event_window_ms: 0.50}
      - {synapse_count: 12, burst_count: 3, events_per_synapse_per_burst: 1, event_window_ms: 0.80}
      - {synapse_count: 16, burst_count: 2, events_per_synapse_per_burst: 1, event_window_ms: 0.40}
      - {synapse_count: 16, burst_count: 3, events_per_synapse_per_burst: 1, event_window_ms: 0.80}
