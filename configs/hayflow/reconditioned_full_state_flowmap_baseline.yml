schema_version: 02b-experiment-v1

dataset:
  required_schema_version: 1.0.1
  required_transition_count: 1224
  preserve_splits: true
  preserve_trajectories: true
  require_original_02_result: true

experiment:
  profile: diagnostic_full
  initialization_seeds: [17, 29, 43]
  maximum_epochs: 60
  early_stopping_patience: 10
  batch_size: 2
  evaluation_batch_size: 2
  learning_rate: 0.0002
  weight_decay: 0.00001
  gradient_clip_norm: 1.0
  ridge_alpha: 10.0
  activity_epsilon: 0.000000001
  sparse_update_fraction: 0.10
  minimum_scale: 0.00000001
  oversample_dendritic_factor: 6
  lambda_voltage_subthreshold: 0.5
  lambda_voltage_spike: 1.0
  lambda_voltage_dendritic: 1.0
  lambda_voltage_boundary: 0.75
  lambda_mechanism_state: 0.20
  lambda_calcium: 0.30
  lambda_synapse_state: 0.05
  lambda_sparse_activity: 0.10
  lambda_sparse_value: 0.20
  lambda_event: 0.30
  lambda_event_timing: 0.03
  lambda_event_region: 0.01
  privileged_fixed_weight: 0.005
  privileged_gradient_fraction: 0.25
  rollout_horizons_ms: [2, 4, 8, 16]
  selection_rollout_windows: 8
  maximum_rollout_windows_per_split: 32
  deterministic_algorithms: true

frozen_contract:
  architectures: [B0, B1, B3]
  input_encodings: [U1, U2]
  new_trajectories: false
  hines: false
  persistent_latents: false
  morphology_reduction: false
  mamba: false
  s4: false

variants:
  synapse:
    S0: excluded_from_main_loss_and_early_stopping
    S1: hurdle_activity_plus_active_value
  privileged:
    P0: disabled
    P1a: fixed_small_normalized_weight
    P1b: gradient_contribution_capped
  gate_transform_ablation: [logit, identity]

outputs:
  directory: artifacts/reconditioned_full_state_flowmap_baseline
  required:
    - distribution_audit.json
    - distribution_audit_state_variables.parquet
    - distribution_audit_privileged_variables.parquet
    - normalization_schema.json
    - loss_schema.json
    - checkpoint_fingerprints.json
    - gradient_contribution_report.parquet
    - seed_level_metrics.parquet
    - seed_aggregate_metrics.parquet
    - one_step_metrics.parquet
    - rollout_metrics.parquet
    - event_metrics.parquet
    - branching_metrics.parquet
    - comparison_with_original_02.json
    - final_report.json
