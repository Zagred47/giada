schema_version: 0.1.0
dataset:
  required_schema_version: 1.0.1
  required_teacher_commit: 074c4666300a8ad246601dab179a97a6942f0f29
  required_transition_count: 1224
  verify_all_artifact_sha256: true
  reject_schema_1_0_0: true

experiment:
  profile: diagnostic_full
  initialization_seeds: [17, 29, 43]
  maximum_epochs: 60
  early_stopping_patience: 8
  batch_size_b2: 8
  batch_size_b3: 2
  learning_rate: 0.0003
  weight_decay: 0.00001
  gradient_clip_norm: 1.0
  ridge_alpha: 10.0
  state_loss_weight: 1.0
  event_presence_loss_weight: 0.25
  event_timing_loss_weight: 0.05
  event_region_loss_weight: 0.02
  privileged_current_loss_weight: 0.05
  privileged_microtrace_loss_weight: 0.02
  rollout_horizons_ms: [2, 4, 8, 16]
  maximum_rollout_windows_per_split: 32
  num_workers: 0
  deterministic_algorithms: true

state_contract:
  dynamic_categories:
    - voltage
    - mechanism_states
    - calcium_ions
    - synapse_states
  predict_transformed_delta: true
  normalization_fit_split: train
  rng_is_external: true
  regress_rng_as_continuous_state: false
  use_future_microtraces_as_input: false
  use_future_event_labels_as_input: false

input_encodings:
  U1:
    kind: per_segment_aggregates
    includes:
      - counts_by_synapse_type
      - total_weight_by_synapse_type
      - gmax_weight_by_synapse_type
      - temporal_first_moment
      - somatic_current_command
  U2:
    kind: ordered_event_set
    includes:
      - timestamp
      - segment
      - synapse_type
      - weight
      - gmax
      - release_value_and_availability_mask
  release_policy: use_observed_release_only_when_available_else_document_missing

models:
  B0: persistence
  B1: dual_ridge_delta
  B2: controlled_projection_residual_mlp
  B3: shared_variable_segment_residual_mlp
  forbidden:
    - differentiable_hines
    - persistent_latent_state
    - morphology_reduction
    - iterative_message_passing
    - mamba
    - s4
    - mixed_precision

ablations:
  - A_voltage_only
  - B_voltage_events_U1
  - B_voltage_events_U2
  - C_full_events_U1
  - C_full_events_U2
  - D_full_events_U2_privileged

outputs:
  directory: artifacts/full_state_flowmap_baseline
  required:
    - experiment_manifest.json
    - normalization_schema.json
    - model_configs.json
    - checkpoints
    - one_step_metrics.parquet
    - rollout_metrics.parquet
    - event_metrics.parquet
    - ablation_metrics.parquet
    - branching_report.json
    - prediction_examples
    - figures
    - final_report.json
